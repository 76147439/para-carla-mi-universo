<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Universo Infinito de Carla 🌻🌌💖</title>
    <style>
        :root {
            --glow-sun: #ffd700;
            --text-color: #fff9c4;
            --orbit-line-color: rgba(255, 255, 255, 0.1);
            --aura-frase: 0 0 15px rgba(255, 215, 0, 0.8);
            --font-main: 'Georgia', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; backface-visibility: hidden; touch-action: manipulation; }

        body {
            background: #000; color: white; font-family: var(--font-main);
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
        }

        /* --- ESTRELLAS FUGACES --- */
        .shooting-star {
            position: absolute; width: 2px; height: 2px;
            background: #fff; box-shadow: 0 0 10px #fff; border-radius: 50%;
            pointer-events: none; z-index: 1; animation: shoot 3s linear forwards;
        }
        @keyframes shoot {
            0% { transform: translate3d(-100px, -100px, 0) rotate(45deg) scale(0); opacity: 0; }
            10% { opacity: 1; scale: 1; }
            30% { transform: translate3d(400px, 400px, 0) rotate(45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* --- ACCESO --- */
        #pantalla-acceso {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center; transition: 1.5s;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9); padding: 30px; border-radius: 30px;
            border: 2px solid gold; text-align: center; width: 85%; max-width: 400px;
        }
        .osito-frame { font-size: 4rem; margin-bottom: 15px; }
        .ojos-cerrados { display: none; }
        .login-box h1 { color: gold; font-size: 1.8rem; margin-bottom: 20px; }
        .login-box input { background: transparent; border: 2px solid gold; padding: 12px; border-radius: 15px; color: white; font-size: 1.2rem; text-align: center; width: 100%; outline: none; }
        .login-box button { margin-top: 20px; padding: 12px 30px; background: gold; color: black; border: none; border-radius: 25px; font-weight: bold; width: 100%; }

        /* --- PORTADA Y JARDÍN --- */
        #portada {
            position: fixed; inset: 0; background: #000; z-index: 9000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: 2s; padding: 20px;
        }
        .stars-carta { position: absolute; inset: 0; pointer-events: none; }
        .carta-contenedor {
            background: #fff9c4; padding: 25px; border-radius: 30px;
            border: 6px solid #ffd700; width: 100%; max-width: 500px; text-align: center;
            color: #222; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); z-index: 10;
        }
        .carta-contenedor h2 { font-size: 1.5rem; color: #b8860b; margin-bottom: 15px; }
        .carta-contenedor p { font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; font-style: italic; }

        .jardin-inferior {
            position: absolute; bottom: 0; width: 100%; height: 30vh;
            display: flex; justify-content: space-around; align-items: flex-end;
            padding-bottom: 10px; z-index: 5; pointer-events: none;
        }
        .flor-jardin { font-size: 2.5rem; animation: viento 4s infinite ease-in-out alternate; }
        @keyframes viento { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }

        /* --- SUBTÍTULOS Y TEXTO (PARA CELULAR) --- */
        #subtitulos {
            position: fixed; bottom: 140px; width: 90%; left: 5%; text-align: center;
            font-size: 1.1rem; color: #fff; text-shadow: 0 0 10px #000;
            z-index: 8000; opacity: 0; transition: 0.5s; font-style: italic;
        }

        .caja-texto {
            position: fixed; bottom: 40px; left: 5%; width: 90%;
            background: rgba(0,0,0,0.85); border: 2px solid gold; padding: 15px;
            border-radius: 30px; color: var(--text-color); font-size: 1rem;
            opacity: 0; transition: 1s; z-index: 5000; text-align: center;
        }

        /* --- UNIVERSO --- */
        #titulo-universo {
            position: fixed; top: 30px; width: 100%; text-align: center;
            font-size: 1.5rem; color: gold; z-index: 100; text-shadow: 0 0 20px gold;
            opacity: 0; transition: 3s; pointer-events: none;
        }

        #main-container { width: 100%; height: 100%; opacity: 0; transition: 3s; transform-style: preserve-3d; }
        .universo-canvas { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

        .sol-core {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, #fff, #ffeb3b 40%, #ff9800 100%);
            box-shadow: 0 0 60px 20px rgba(255, 200, 0, 0.6);
            position: absolute; transform: translate(-50%, -50%); z-index: 20;
        }

        .orbita-visual {
            position: absolute; border: 1px solid var(--orbit-line-color);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .astro-mover {
            position: absolute; top: 0; left: 0; transform-style: preserve-3d;
            animation: rotarOrbita linear infinite;
        }
        @keyframes rotarOrbita {
            from { transform: rotate(0deg) translate3d(var(--dist), 0, 0) rotate(0deg); }
            to { transform: rotate(360deg) translate3d(var(--dist), 0, 0) rotate(-360deg); }
        }

        .planeta-body { border-radius: 50%; position: relative; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .luna-sistema { position: absolute; top: 50%; left: 50%; animation: rotarLuna 6s linear infinite; }
        .luna-body { width: 8px; height: 8px; background: #eee; border-radius: 50%; }
        @keyframes rotarLuna { from { transform: rotate(0deg) translate3d(25px, 0, 0); } to { transform: rotate(360deg) translate3d(25px, 0, 0); } }

        /* --- FLORES Y METEORITOS --- */
        .flor-espacial { position: absolute; animation: rotarOrbita linear infinite; display: flex; flex-direction: column; align-items: center; }
        .flor-icono { font-size: 1.2rem; filter: drop-shadow(0 0 10px gold); }
        .frase-flotante, .label-planeta { color: gold; font-size: 0.6rem; text-shadow: 0 0 5px #000; white-space: nowrap; margin-bottom: 4px; }

        .star { position: absolute; background: #fff; border-radius: 50%; animation: pulso var(--t) infinite alternate; }
        @keyframes pulso { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .foto-polaroid {
            position: fixed; width: 180px; background: #fff; padding: 8px 8px 30px 8px;
            box-shadow: 0 0 30px gold; opacity: 0; transition: 1.5s; z-index: 4000;
            pointer-events: none; transform: scale(0.5);
        }
        .foto-polaroid img { width: 100%; display: block; }
        .foto-polaroid.active { opacity: 1; transform: rotate(var(--r)) scale(1); }

        .corazon-caida {
            position: fixed; top: -50px; z-index: 9999; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
            animation: caer linear forwards;
        }
        .corazon-caida-icono { font-size: 1.5rem; color: #ff3366; }
        .corazon-caida-texto { font-size: 0.6rem; color: white; text-shadow: 0 0 5px red; }

        @keyframes caer { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="pantalla-acceso">
        <div class="login-box">
            <div class="osito-frame"><span class="ojos-abiertos">🐻</span><span class="ojos-cerrados">🙈</span></div>
            <h1>Mi Universo</h1>
            <input type="password" id="input-clave" placeholder="Contraseña..." oninput="manejarOsito()">
            <button onclick="validar()">Entrar</button>
        </div>
    </div>

    <div id="portada">
        <div class="stars-carta" id="stars-carta-layer"></div>
        <div class="carta-contenedor">
            <h2>Para Mi Princesa Carla...🌻🌌</h2>
            <p>Te conocí y cambiaste mi mundo por completo. Me enamoré de esos ojitos lindos tiernos, tus labios, tu carita suave... gracias por estar en mi vida. Esta es para ti. Descubre cada detalle.</p>
            <button onclick="iniciar()" style="background:gold; padding:12px 25px; border:none; border-radius:20px; font-weight:bold;">Abrir Universo</button>
        </div>
        <div class="jardin-inferior" id="jardin"></div>
    </div>

    <h1 id="titulo-universo">ERES MI TODO</h1>
    <div id="subtitulos"></div>
    <div class="caja-texto" id="caja"></div>
    <audio id="musica" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div id="main-container">
        <div id="stars-layer"></div>
        <div id="shooting-stars-layer"></div>
        <div class="universo-canvas" id="canvas">
            <div class="sol-core" id="sol" onclick="hablar('Mi amor, eres mi sol que brilla siempre. ☀️💖')"></div>
        </div>
    </div>

    <script>
        const CLAVE = "carla";
        const planetasData = [
            { n: "Mercurio", d: 80, t: 12, v: 8, c: "#aaa", f: "Veloz como Mercurio 🚀" },
            { n: "Venus", d: 110, t: 18, v: 12, c: "#e3bb76", f: "Brillante como Venus ✨" },
            { n: "Tierra", d: 150, t: 22, v: 18, c: "#2e86de", f: "Mi mundo eres tú 🌍❤️", l:true },
            { n: "Marte", d: 200, t: 16, v: 22, c: "#f25c4c", f: "Pasión como Marte 🔥" },
            { n: "Júpiter", d: 280, t: 40, v: 35, c: "#d39c7e", f: "Amor gigante 🌌" },
            { n: "Saturno", d: 370, t: 32, v: 45, c: "#e2d2a2", f: "Amor perfecto 🪐", a:true },
            { n: "Urano", d: 440, t: 24, v: 55, c: "#b2ebf2", f: "Me das la vuelta ✨" },
            { n: "Neptuno", d: 500, t: 24, v: 65, c: "#3f51b5", f: "Amor profundo 🌊" }
        ];

        const guionSubtitulos = [
            { t: 2, s: "Desde que te vi..." },
            { t: 6, s: "Supe que todo cambiaría." },
            { t: 10, s: "Eres la dueña de mi corazón," },
            { t: 14, s: "mi universo entero." },
            { t: 18, s: "Te amo infinitamente, Carla." }
        ];

        const frasesFlores = ["Te amo", "Mi vida", "Carla Linda", "Mi sol", "Princesa", "Siempre juntos"];
        const iconosFlores = ["🌻", "🌹", "💖", "✨"];

        function manejarOsito() {
            const v = document.getElementById('input-clave').value;
            document.querySelector('.ojos-abiertos').style.display = v.length ? 'none' : 'block';
            document.querySelector('.ojos-cerrados').style.display = v.length ? 'block' : 'none';
        }

        function lanzarRafagaEstrellas(contenedor) {
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    let s = document.createElement('div'); s.className = 'shooting-star';
                    s.style.top = Math.random()*80+"vh"; s.style.left = Math.random()*80+"vw";
                    contenedor.appendChild(s);
                    setTimeout(() => s.remove(), 3000);
                }, i * 300);
            }
        }

        function validar() {
            if(document.getElementById('input-clave').value.toLowerCase() === CLAVE) {
                document.getElementById('pantalla-acceso').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('pantalla-acceso').style.display = 'none';
                    document.getElementById('portada').style.display = 'flex';
                    const layer = document.getElementById('stars-carta-layer');
                    for(let i=0; i<100; i++) {
                        let s = document.createElement('div'); s.className = 'star';
                        let sz = Math.random()*2; s.style.width = s.style.height = sz+"px";
                        s.style.top = Math.random()*100+"vh"; s.style.left = Math.random()*100+"vw";
                        s.style.setProperty('--t', (Math.random()*3+2)+"s");
                        layer.appendChild(s);
                    }
                    const j = document.getElementById('jardin');
                    for(let i=0; i<15; i++) {
                        let s = document.createElement('span'); s.className = 'flor-jardin';
                        s.innerText = iconosFlores[i % iconosFlores.length];
                        j.appendChild(s);
                    }
                    setInterval(() => lanzarRafagaEstrellas(layer), 4000); 
                    setTimeout(() => document.getElementById('portada').style.opacity = 1, 100);
                }, 1000);
            }
        }

        function lanzarPolaroid(src, step) {
            const f = document.createElement('div'); f.className = 'foto-polaroid';
            f.innerHTML = `<img src="${src}">`;
            f.style.left = "50%"; f.style.top = "30%"; f.style.marginLeft = "-90px";
            const r = Math.random()*10-5; f.style.setProperty('--r', r+"deg");
            document.body.appendChild(f);
            setTimeout(() => f.classList.add('active'), 100);
            setTimeout(() => { f.classList.remove('active'); setTimeout(()=>f.remove(), 2000); }, 5000);
        }

        function iniciar() {
            document.getElementById('portada').style.opacity = 0;
            const audio = document.getElementById('musica'); audio.play();
            audio.ontimeupdate = () => {
                const ct = audio.currentTime;
                const sub = guionSubtitulos.find((s, idx) => ct >= s.t && (idx === guionSubtitulos.length-1 || ct < guionSubtitulos[idx+1].t));
                const el = document.getElementById('subtitulos');
                if (sub) { el.innerText = sub.s; el.style.opacity = 1; } else { el.style.opacity = 0; }
            };

            setTimeout(() => {
                document.getElementById('portada').style.display = 'none';
                document.getElementById('main-container').style.opacity = 1;
                document.getElementById('titulo-universo').style.opacity = 1;
                
                const sLayer = document.getElementById('stars-layer');
                for(let i=0; i<300; i++) {
                    let s = document.createElement('div'); s.className = 'star';
                    s.style.width = s.style.height = "1px";
                    s.style.top = Math.random()*100+"vh"; s.style.left = Math.random()*100+"vw";
                    sLayer.appendChild(s);
                }
                setInterval(() => lanzarRafagaEstrellas(document.getElementById('shooting-stars-layer')), 3000);

                const canv = document.getElementById('canvas');
                planetasData.forEach(p => {
                    let orb = document.createElement('div'); orb.className = 'orbita-visual';
                    orb.style.width = orb.style.height = (p.d*2)+"px";
                    canv.appendChild(orb);
                    let mov = document.createElement('div'); mov.className = 'astro-mover';
                    mov.style.setProperty('--dist', p.d+"px"); mov.style.animationDuration = p.v+"s";
                    let html = `<div class="planeta-body" onclick="hablar('${p.f}')" style="width:${p.t}px; height:${p.t}px; background:${p.c}">`;
                    if(p.l) html += `<div class="luna-sistema"><div class="luna-body"></div></div>`;
                    if(p.a) html += `<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotateX(70deg); border:2px solid rgba(255,255,255,0.2); border-radius:50%; width:${p.t*2}px; height:${p.t*2}px;"></div>`;
                    html += `</div><span class="label-planeta" style="position:absolute; top:${p.t+5}px; left:50%; transform:translateX(-50%)">${p.n}</span>`;
                    mov.innerHTML = html;
                    canv.appendChild(mov);
                });

                for(let i=0; i<20; i++) {
                    let f = document.createElement('div'); f.className = 'flor-espacial';
                    f.style.setProperty('--dist', (120 + Math.random()*400)+"px");
                    f.style.animationDuration = (20 + Math.random()*30)+"s";
                    f.innerHTML = `<span class="frase-flotante">${frasesFlores[i%frasesFlores.length]}</span><span class="flor-icono">${iconosFlores[i%iconosFlores.length]}</span>`;
                    canv.appendChild(f);
                }

                iniciarHistoria();
                iniciarCamara();
                lluviaCorazones();
            }, 2000);
        }

        function hablar(t) {
            const c = document.getElementById('caja'); c.innerText = t;
            c.style.opacity = 1; setTimeout(() => c.style.opacity = 0, 4000);
        }

        function lluviaCorazones() {
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    let c = document.createElement('div'); c.className = 'corazon-caida';
                    c.innerHTML = `<div class="corazon-caida-icono">❤️</div><div class="corazon-caida-texto">te amo</div>`;
                    c.style.left = Math.random()*100+"vw";
                    c.style.animationDuration = (Math.random()*2+4)+"s";
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 6000);
                }, i*600);
            }
            setTimeout(lluviaCorazones, 30000);
        }

        let step = 0;
        const guionHistoria = [
            { t: "Todo comenzó hace 5 años...", d: 5000 },
            { t: "Un simple juego me llevó a ti.", d: 5000, f: "foto1.jpeg" },
            { t: "Aquel 15 de marzo fue especial. 💖", d: 5000, f: "foto2.jpeg" },
            { t: "La distancia no nos detuvo.", d: 5000, f: "foto3.jpeg" },
            { t: "31 de diciembre de 2024: el mejor día. 😍", d: 6000, f: "foto4.jpeg" },
            { t: "Eres mi vida entera, Carla. 🌻", d: 5000, f: "foto5.jpeg" }
        ];

        function iniciarHistoria() {
            if(step >= guionHistoria.length) return;
            let item = guionHistoria[step];
            hablar(item.t);
            if(item.f) lanzarPolaroid(item.f, step);
            setTimeout(() => { step++; iniciarHistoria(); }, item.d + 1000);
        }

        let zoom = 1, rx = 0, ry = 0;
        function iniciarCamara() {
            let lx, ly, d = false;
            window.addEventListener('touchstart', e => { d=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY; });
            window.addEventListener('touchmove', e => {
                if(!d) return;
                ry += (e.touches[0].clientX-lx)*0.3; rx -= (e.touches[0].clientY-ly)*0.3;
                lx=e.touches[0].clientX; ly=e.touches[0].clientY; act();
            });
            window.addEventListener('touchend', () => d=false);
        }
        function act() { document.getElementById('canvas').style.transform = `scale(${zoom}) rotateX(${rx}deg) rotateY(${ry}deg)`; }
    </script>
</body>
</html>
